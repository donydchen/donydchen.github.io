# Selected Publications.
#
# Newest at the top. Each entry renders one .pub block via
# `_includes/publications.html`. Comment out (`#`) the lines for a paper
# you want to hide without losing the data.
#
# Schema per entry:
#   title    - paper title. May contain inline HTML (e.g. wrap part of
#              the title with `<span class="hl-work">…</span>` to apply
#              the accent highlight, like "Depth Anything 3" below).
#   venue    - venue + year string (e.g. "ICML 2026", "Tech Report 2025").
#   authors  - plain comma-separated author list. Conventions:
#                * the homepage owner names listed in `_data/authors.yml`
#                  (currently "Donny Y. Chen" and "Yuedong Chen") are
#                  auto-bolded by the include — do NOT wrap them in
#                  <b>…</b> here;
#                * the include also inserts "and " before the final
#                  author automatically — do NOT write ", and X";
#                * `*` for equal contribution and `†` for project lead
#                  go right after the name (e.g. "Weijie Wang*",
#                  "Donny Y. Chen†");
#                * `<i>et al.</i>` is honored verbatim if you want to
#                  intentionally elide the tail of a long author list.
#   links    - ordered list of badge links rendered as `[text]`. Each:
#                text       - link label (required)
#                url        - link target (required)
#                highlight  - true to wrap in `<span class="hl-work">`
#                             (the colored accent badge)
#                stars      - optional "owner/repo" to append a GitHub
#                             stars shield badge after the link
#   extra    - optional raw HTML appended after the links row, e.g.
#              "also presented at …" notes that don't fit the badge
#              pattern. Supports multi-line via the `|` YAML literal.

