# Time-sensitive news.
#
# Rendered above the body-social row by `_includes/news.html`. Use
# this for short-lived announcements: conferences you'll attend, jobs
# you're hiring for, talks coming up, etc.
#
# Each entry takes:
#   html    - the message body. Raw HTML is allowed; you can use
#             `<a class="external" …>`, `<p>`, `<br>`, anything that
#             renders inline.
#   expires - OPTIONAL "YYYY-MM-DD" date string (single-quoted so
#             YAML keeps it as text). The entry is shown up to and
#             including that date, then hidden automatically. Omit
#             this field for an open-ended announcement.
#
# Two ways to hide an entry:
#   1. Set `expires` to a past date (or just leave the past date in
#      place after the event happens) — the include checks against
#      `site.time` at every build.
#   2. Comment out the entry by prefixing every line with `#`. Useful
#      when you want to keep the text around for next year's edition
#      of the same event.

