# Co-author homepages. Used by `_includes/publications.html` to wrap each
# matching name in `<a class="coauthor" target="_blank" …>` so the author
# row links out without adding any visual underline.
#
# Schema:
#   '<exact name as it appears in publications.yml>': '<homepage URL>'
#
# Notes:
#   - The homepage owner (Donny Y. Chen / Yuedong Chen) is NEVER listed
#     here — the include treats those names specially and renders them
#     as plain text (or plain bold text if wrapped in <b>…</b>).
#   - The match is a literal substring lookup on the cleaned name, so
#     the key must match the spelling in `_data/publications.yml`
#     character-for-character. Stick to plain ASCII hyphens in names.
#   - Names not in this file fall back to a Google search link with the
#     name as the query. So adding a name here is optional; it just
#     gives a nicer destination than search.
#   - Order is alphabetical for human convenience. Liquid `replace` is
#     a substring match, but no current key is a substring of another.

