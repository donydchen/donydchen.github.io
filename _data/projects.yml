# Projects & Talks section.
#
# Two lists, rendered by `_includes/projects.html` in this order:
#
#   talks  — text-only invited-talk entries displayed as a `<ul>`.
#            Newest at the top. Each entry:
#              date  - free-form string (any format, just the literal
#                      shown before the comma — e.g. "28-01-2025").
#              type  - what kind of appearance it was, e.g.
#                      "Invited talk", "Keynote", "Tutorial".
#              title - the talk title (rendered inside double quotes).
#              venue - venue + location, italicized in the output.
#              host  - optional. {name, url} of the host. If omitted,
#                      the trailing ", hosted by …" is dropped.
#
#   cards  — image + description thumbnails inside `.demo-proj-row`.
#            Newest at the top. Each entry:
#              href  - URL the whole card links to (opens in new tab).
#              image - path under assets/img/ (or any URL).
#              desc  - description shown below the image. Inline HTML
#                      is allowed (e.g. an `<a>` link, or
#                      `<span class="icon-youtube"></span>` for the
#                      red-play badge).
#              style - OPTIONAL inline style applied to the image
#                      wrapper `<div>`. Used by the commented-out
#                      WAYVE entry below to add vertical breathing
#                      room when the source PNG is unusually tall.

talks:
  - date: '28-01-2025'
    type: 'Invited talk'
    title: "Feed-forward NVS from Sparse Inputs"
    venue: 'Amazon, Tel Aviv'
    host:
